<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D3748" />
      <stop offset="100%" stop-color="#1A202C" />
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9F7AEA" />
      <stop offset="50%" stop-color="#F687B3" />
      <stop offset="100%" stop-color="#ED64A6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <rect width="800" height="200" fill="url(#bg-gradient)" rx="15" ry="15" />
  
  <!-- Grid pattern for a technical look -->
  <g opacity="0.1" stroke="#ffffff" stroke-width="1">
    <path d="M0,40 L800,40 M0,80 L800,80 M0,120 L800,120 M0,160 L800,160" />
    <path d="M100,0 L100,200 M200,0 L200,200 M300,0 L300,200 M400,0 L400,200 M500,0 L500,200 M600,0 L600,200 M700,0 L700,200" />
  </g>
  
  <text x="400" y="95" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="900" fill="url(#text-gradient)" text-anchor="middle" filter="url(#shadow)">
    AWESOME CONTEXT WINDOW
  </text>
  
  <text x="400" y="145" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" fill="#E2E8F0" text-anchor="middle" font-weight="400">
    Breaking the Quadratic Barrier of Language Models 🚀
  </text>
  
  <circle cx="50" cy="100" r="15" fill="#4299E1" opacity="0.8" filter="url(#shadow)" />
  <circle cx="90" cy="100" r="10" fill="#F6E05E" opacity="0.8" filter="url(#shadow)" />
  <circle cx="750" cy="100" r="15" fill="#48BB78" opacity="0.8" filter="url(#shadow)" />
  <circle cx="710" cy="100" r="10" fill="#ED8936" opacity="0.8" filter="url(#shadow)" />
</svg>
